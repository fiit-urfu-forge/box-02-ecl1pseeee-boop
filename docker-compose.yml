# ---------------------------------------------------------------------------
# DigitalBank — local/dev stack (§8 of Claude_SPEC)
# ---------------------------------------------------------------------------
name: digitalbank

# Non-secret overrides only. Secrets (APP_KEY, passwords, webhook secrets)
# live in backend/.env — phpdotenv will NOT overwrite anything the container
# already has, so we intentionally leave those out here.
x-app-env: &app-env
  DB_HOST: db
  REDIS_HOST: redis

services:
  # --------------------------------------------------------------------- DB
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digitalbank}
      POSTGRES_USER: ${POSTGRES_USER:-digitalbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digitalbank} -d ${POSTGRES_DB:-digitalbank}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # ------------------------------------------------------------------ Redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  # --------------------------------------------------------------- PHP-FPM
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: digitalbank/app:local
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-env
    volumes:
      - ./backend:/var/www/html
    expose:
      - "9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # php-fpm exposes a status port only when configured; fall back to a
      # simple PHP-level check on the socket.
      test: ["CMD-SHELL", "php -r \"\\$$s=@fsockopen('127.0.0.1',9000);exit(\\$$s?0:1);\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # --------------------------------------------------------------- Worker
  worker:
    image: digitalbank/app:local
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-env
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=transfers,notifications,default
      - --tries=3
      - --backoff=10
      - --sleep=1
    volumes:
      - ./backend:/var/www/html
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # --------------------------------------------------------------- Scheduler
  scheduler:
    image: digitalbank/app:local
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *app-env
    # `schedule:work` runs the Laravel scheduler loop in foreground (Laravel 11).
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./backend:/var/www/html
    depends_on:
      app:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256m

  # --------------------------------------------------------------- Frontend
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
    image: digitalbank/frontend:local
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_OPTIONS: "--max-old-space-size=1024"
      # Empty = same-origin. Works both on localhost and on Codespaces
      # forwarded https URLs, since the SPA and API live behind the same
      # nginx. `-` (not `:-`) lets an explicitly-empty env var pass through.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL-/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL-}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://app:9000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536m

  # --------------------------------------------------------------- Nginx
  web:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: digitalbank/web:local
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:ro
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  db_data:
  redis_data:
  frontend_node_modules:
