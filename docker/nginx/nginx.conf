# ---------------------------------------------------------------------------
# Reverse proxy for DigitalBank
#   /api/*, /sanctum/* -> Laravel PHP-FPM (app:9000)
#   /_next/static, /static -> served from frontend volume (future)
#   everything else        -> Next.js SSR (frontend:3000)
# ---------------------------------------------------------------------------
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens  off;
    client_max_body_size 16m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/html
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';
    access_log  /var/log/nginx/access.log  json;

    # Use Docker's embedded DNS so upstream names are resolved lazily.
    # This lets nginx start even if the frontend / app container isn't
    # registered yet (they'll be resolved on the first request).
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream php_fpm {
        server app:9000;
        keepalive 16;
    }

    # -----------------------------------------------------------------------
    # Public server
    # -----------------------------------------------------------------------
    server {
        listen       80 default_server;
        server_name  _;

        root   /var/www/html/public;
        index  index.php;

        # Deny dotfiles.
        location ~ /\.(?!well-known) { deny all; }

        # Healthcheck used by docker-compose.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Laravel API + Sanctum CSRF cookie endpoint.
        location ^~ /api/ {
            try_files $uri /index.php?$query_string;
        }

        location ^~ /sanctum/ {
            try_files $uri /index.php?$query_string;
        }

        # Laravel front controller (any hit routed to API paths).
        location ~ \.php$ {
            try_files                 $uri =404;
            fastcgi_split_path_info   ^(.+\.php)(/.+)$;
            fastcgi_pass              php_fpm;
            fastcgi_index             index.php;
            include                   fastcgi_params;
            fastcgi_param             SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param             DOCUMENT_ROOT   $realpath_root;
            fastcgi_read_timeout      60s;
            fastcgi_buffer_size       16k;
            fastcgi_buffers           8 16k;
        }

        # Next.js static chunks — defer name resolution via $variable.
        location ^~ /_next/static/ {
            set $nextjs_upstream "frontend:3000";
            proxy_cache_valid 200 1y;
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://$nextjs_upstream;
        }

        # Fallback — Next.js SSR (also via variable for lazy DNS).
        location / {
            set $nextjs_upstream "frontend:3000";
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
            proxy_pass         http://$nextjs_upstream;
        }
    }
}
